<div style="max-width: 480px; margin: 50px auto;">
    <div class="step-card">
        <div class="step-header" style="text-align: center; justify-content: center;">
            <h3>🔑 Masuk Ke Akun Anda</h3>
        </div>

        <form ng-submit="login()">
            <div class="form-group">
                <label for="email">Alamat Email</label>
                <input type="email" ng-model="credentials.email" id="email" class="input-control" placeholder="nama@email.com" required>
            </div>
            
            <div class="form-group" style="margin-top: 15px;">
                <label for="password">Password</label>
                <input type="password" ng-model="credentials.password" id="password" class="input-control" placeholder="Masukkan password Anda" required>
            </div>

            <div style="margin-top: 25px;">
                <button type="submit" class="btn btn-primary w-100">Masuk</button>
            </div>
        </form>

        <p style="color: var(--text-muted); text-align: center; font-size: 0.9rem; margin-top: 20px;">
            Belum punya akun? <a href="/register" style="color: var(--primary); font-weight: 600;">Daftar Sekarang ➔</a>
        </p>
    </div>
</div>
