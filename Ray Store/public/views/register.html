<div style="max-width: 480px; margin: 50px auto;">
    <div class="step-card">
        <div class="step-header" style="text-align: center; justify-content: center;">
            <h3>👤 Daftar Akun Baru</h3>
        </div>

        <form ng-submit="register()">
            <div class="form-group">
                <label for="name">Nama Lengkap</label>
                <input type="text" ng-model="regData.name" id="name" class="input-control" placeholder="Masukkan nama lengkap Anda" required>
            </div>

            <div class="form-group" style="margin-top: 15px;">
                <label for="email">Alamat Email</label>
                <input type="email" ng-model="regData.email" id="email" class="input-control" placeholder="nama@email.com" required>
            </div>

            <div class="form-group" style="margin-top: 15px;">
                <label for="phone">No. WhatsApp / HP</label>
                <input type="tel" ng-model="regData.phone" id="phone" class="input-control" placeholder="08xxxxxxxxxx">
            </div>
            
            <div class="form-group" style="margin-top: 15px;">
                <label for="password">Password</label>
                <input type="password" ng-model="regData.password" id="password" class="input-control" placeholder="Minimal 6 karakter" required>
            </div>

            <div style="margin-top: 25px;">
                <button type="submit" class="btn btn-primary w-100">Daftar</button>
            </div>
        </form>

        <p style="color: var(--text-muted); text-align: center; font-size: 0.9rem; margin-top: 20px;">
            Sudah punya akun? <a href="/login" style="color: var(--primary); font-weight: 600;">Masuk ➔</a>
        </p>
    </div>
</div>
